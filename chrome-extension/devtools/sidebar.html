<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../popup/popup.css" />
    <style>
      body {
        margin: 0;
        padding: 12px;
        background-color: var(--bg-color, #04111f);
        min-height: 100vh;
      }
      .sidebar-empty {
        text-align: center;
        color: var(--text-secondary);
        font-size: 13px;
        padding: 20px 0;
      }
      .element-info {
        margin-bottom: 12px;
        display: grid;
        gap: 6px;
      }
      .sidebar-issue-card {
        background: var(--surface, rgba(8, 20, 36, 0.84));
        border: 1px solid var(--surface-border, rgba(148, 163, 184, 0.14));
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .element-tag {
        width: fit-content;
      }
      .element-selector {
        display: block;
        font-size: 11px;
        color: var(--text-secondary);
        word-break: break-word;
      }
      .element-meta {
        font-size: 11px;
        color: var(--text-secondary);
      }
      .sidebar-pair {
        display: grid;
        gap: 6px;
      }
      .pair-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: monospace;
        font-size: 12px;
      }
      .sidebar-score-grid {
        display: grid;
        gap: 8px;
      }
      .sidebar-score-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 6px;
      }
      .sidebar-score-value {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-label {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .computed-section {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--surface-border, rgba(148, 163, 184, 0.14));
      }
      .computed-list {
        display: grid;
        gap: 8px;
      }
      .computed-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 8px 0;
      }
      .computed-main {
        min-width: 0;
      }
      .computed-meta {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 3px;
      }
      .computed-prop {
        font-family: monospace;
        font-size: 12px;
        color: var(--text-primary);
      }
      .computed-value {
        font-family: monospace;
        font-size: 11px;
        color: var(--text-secondary);
      }
      .computed-note {
        font-size: 11px;
        color: var(--text-secondary);
      }
      .computed-result {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .computed-swatch {
        width: 14px;
        height: 14px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="content">
      <div class="sidebar-empty">Select an element to analyze contrast.</div>
    </div>

    <script src="../shared/contrast.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
